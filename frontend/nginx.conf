server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Sirve los archivos estáticos de React Vue/Vite Angular (manejo de SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy a Cloud Run API
    location /api/ {
        # Reescribe para dejar intacta la URL pero proxy al Cloud Run real
        proxy_pass https://gclientes-api-rgl4defbsq-uc.a.run.app/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host gclientes-api-rgl4defbsq-uc.a.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
